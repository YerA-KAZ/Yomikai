version: "1"

services:
  - type: web
    name: yomikai-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: yomikai-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        # Render может добавить уникальный хэш к URL фронтенда (например, yomikai-frontend-abc1.onrender.com).
        # Если это произойдет, вам нужно будет вручную обновить эту переменную в дашборде Render.
        value: "https://yomikai-frontend.onrender.com"
        
  - type: web
    name: yomikai-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    routes:
      # Настройка для React Router (SPA fallback)
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: yomikai-backend
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: yomikai-db
    databaseName: yomikai
    user: yomikai
    plan: free # Можно изменить на 'starter', если нужна платная БД
