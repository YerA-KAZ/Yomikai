version: "1"

services:
  # ==========================================
  # Frontend (React + Nginx)
  # ==========================================
  - type: web
    name: yomikai-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    routes:
      # Настройка для React Router (SPA fallback)
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /index.html
        name: Cache-Control
        value: no-cache
    envVars:
      - key: VITE_API_URL
        value: https://yomikai-backend.onrender.com/api

  # ==========================================
  # Backend (Express + Prisma)
  # ==========================================
  - type: web
    name: yomikai-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: yomikai-db
          property: connectionString
      - key: JWT_SECRET
        value: CHANGE_ME_IN_DASHBOARD  # ⚠️ Make sure to change this secret in the Render dashboard for security.
      - key: FRONTEND_ORIGIN
        value: https://yomikai-frontend.onrender.com
      - key: PORT
        value: "3001"
      - key: NODE_ENV
        value: production

# ==========================================
# PostgreSQL Database
# ==========================================
databases:
  - name: yomikai-db
    databaseName: yomikai
    user: postgres
    plan: free
