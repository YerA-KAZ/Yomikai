version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: yomikai-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: yomikai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d yomikai"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yomikai-backend
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://postgres:123@db:5432/yomikai?schema=public
      - JWT_SECRET=change-me-in-production
      - FRONTEND_ORIGIN=http://localhost
      - PORT=3001
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: yomikai-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
